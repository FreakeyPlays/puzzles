<button
  type="button"
  role="switch"
  [attr.aria-checked]="checked()"
  [attr.aria-label]="ariaLabel()"
  (click)="toggle()"
  class="relative inline-flex h-7 w-12 shrink-0 cursor-pointer rounded-full transition-colors duration-200 ease-in-out focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-background"
  [class.bg-primary]="checked()"
  [class.bg-track]="!checked()"
>
  <span
    class="pointer-events-none m-0.5 inline-block h-6 w-6 rounded-full bg-white shadow-sm ring-0 transition-transform duration-200 ease-in-out"
    [class.translate-x-5]="checked()"
    [class.translate-x-0]="!checked()"
  ></span>
</button>
