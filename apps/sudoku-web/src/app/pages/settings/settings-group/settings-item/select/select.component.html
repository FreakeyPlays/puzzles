<select
  [attr.aria-label]="ariaLabel()"
  [value]="value()"
  (change)="onChange($event)"
  class="rounded-lg border border-gray-200 bg-gray-50 px-3 py-1.5 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
>
  @for (option of options(); track option.value) {
    <option [selected]="option.value === value()" [value]="option.value">{{ option.label }}</option>
  }
</select>
