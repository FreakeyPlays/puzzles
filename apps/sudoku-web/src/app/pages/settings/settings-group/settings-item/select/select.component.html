<select
  [attr.aria-label]="ariaLabel()"
  [value]="value()"
  (change)="onChange($event)"
  class="rounded-lg border border-border bg-surface-muted px-3 py-1.5 text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-primary"
>
  @for (option of options(); track option.value) {
    <option [selected]="option.value === value()" [value]="option.value">{{ option.label }}</option>
  }
</select>
