<div class="flex min-h-full flex-col gap-4 px-4 py-4">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div class="flex flex-col">
      <span class="text-xs font-medium uppercase tracking-widest text-gray-400">
        {{ difficultyLabel() }}
      </span>
      <time
        [attr.aria-label]="'Game time: ' + formattedTime()"
        class="text-2xl font-bold tabular-nums text-gray-900"
      >
        {{ formattedTime() }}
      </time>
    </div>

    <div class="flex gap-2">
      <button
        type="button"
        aria-label="Request a hint"
        class="rounded-xl bg-amber-50 px-3 py-2 text-sm font-semibold text-amber-700 transition-colors hover:bg-amber-100 active:bg-amber-200"
        (click)="requestHint()"
      >
        Hint
      </button>
    </div>
  </div>

  <!-- Board -->
  <app-board
    [puzzle]="game.puzzle()"
    [edits]="game.edits()"
    [selectedIndex]="selectedIndex()"
    (cellSelect)="onCellSelect($event)"
    (deselect)="onDeselect()"
    (digitInput)="onDigitInput($event)"
  />

  <!-- Input Pad -->
  <div class="mt-auto pb-2">
    <app-input-pad (digitInput)="onDigitInput($event)" />
  </div>
</div>

<!-- Result Dialog -->
@if (isSolved()) {
  <dialog
    appAutoShow
    appConfetti
    class="w-full max-w-xs rounded-2xl border-0 bg-white p-6 shadow-xl text-center m-auto backdrop:bg-black/50"
    aria-labelledby="result-title"
    (cancel)="$event.preventDefault()"
  >
    <h2 id="result-title" class="text-2xl font-bold text-gray-900">Puzzle Solved!</h2>
    <div class="mt-4 space-y-1 text-sm text-gray-600">
      <div class="flex justify-between">
        <span>Time</span>
        <span class="font-semibold tabular-nums text-gray-900">{{ formattedTime() }}</span>
      </div>
      <div class="flex justify-between">
        <span>Difficulty</span>
        <span class="font-semibold text-gray-900">{{ difficultyLabel() }}</span>
      </div>
    </div>
    <div class="mt-6 flex gap-3">
      <button
        type="button"
        class="flex-1 rounded-xl border border-gray-300 px-4 py-3 text-sm font-semibold text-gray-700 transition-colors hover:bg-gray-50"
        (click)="goHome()"
      >
        Home
      </button>
      <button
        type="button"
        class="flex-1 rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition-colors hover:bg-blue-700"
        (click)="startNewGameFromResult()"
      >
        New Game
      </button>
    </div>
  </dialog>
}
