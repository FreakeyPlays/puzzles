<div class="flex min-h-full flex-col gap-4 px-4 py-4">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div class="flex flex-col">
      <span class="text-xs font-medium uppercase tracking-widest text-faint">
        {{ difficultyLabel() }}
      </span>
      <time
        [attr.aria-label]="'Game time: ' + formattedTime()"
        class="text-2xl font-bold tabular-nums text-foreground"
      >
        {{ formattedTime() }}
      </time>
    </div>

    <div class="flex gap-2">
      <button
        type="button"
        aria-label="Request a hint"
        class="rounded-xl bg-warning-surface px-3 py-2 text-sm font-semibold text-warning shadow-sm transition hover:opacity-80 active:scale-95"
        (click)="requestHint()"
      >
        Hint
      </button>
    </div>
  </div>

  <!-- Board -->
  <app-board
    [puzzle]="game.puzzle()"
    [edits]="game.edits()"
    [solution]="settings.game().highlightErrors ? game.solution() : ''"
    [selectedIndex]="selectedIndex()"
    (cellSelect)="onCellSelect($event)"
    (deselect)="onDeselect()"
    (digitInput)="onDigitInput($event)"
  />

  <!-- Input Pad -->
  <div class="mt-auto pb-2">
    <app-input-pad
      [solution]="game.solution()"
      [currentBoard]="game.currentBoard()"
      (digitInput)="onDigitInput($event)"
    />
  </div>
</div>

<!-- Result Dialog -->
@if (isSolved()) {
  <dialog
    appAutoShow
    appConfetti
    class="w-full max-w-xs rounded-2xl border-0 bg-surface p-6 shadow-xl text-center m-auto backdrop:bg-black/50"
    aria-labelledby="result-title"
    (cancel)="$event.preventDefault()"
  >
    <h2 id="result-title" class="text-2xl font-bold text-foreground">Puzzle Solved!</h2>
    <div class="mt-4 space-y-1 text-sm text-muted">
      <div class="flex justify-between">
        <span>Time</span>
        <span class="font-semibold tabular-nums text-foreground">{{ formattedTime() }}</span>
      </div>
      <div class="flex justify-between">
        <span>Difficulty</span>
        <span class="font-semibold text-foreground">{{ difficultyLabel() }}</span>
      </div>
    </div>
    <div class="mt-6 flex gap-3">
      <button
        type="button"
        class="flex-1 rounded-xl border border-border px-4 py-3 text-sm font-semibold text-foreground transition-colors hover:bg-surface-muted"
        (click)="goHome()"
      >
        Home
      </button>
      <button
        type="button"
        class="flex-1 rounded-xl bg-primary px-4 py-3 text-sm font-semibold text-on-primary transition-colors hover:bg-primary-hover"
        (click)="startNewGameFromResult()"
      >
        New Game
      </button>
    </div>
  </dialog>
}
