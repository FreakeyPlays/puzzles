<div class="mx-auto grid w-full max-w-sm grid-cols-5 gap-2 px-1">
  @for (digit of digits; track digit) {
    <button
      type="button"
      [disabled]="usedDigits().has(digit)"
      [attr.aria-label]="usedDigits().has(digit) ? digit + ' fully placed' : 'Place ' + digit"
      class="flex aspect-square items-center justify-center rounded-xl text-xl font-bold transition-colors"
      [class.bg-gray-100]="!usedDigits().has(digit)"
      [class.text-gray-800]="!usedDigits().has(digit)"
      [class.hover:bg-gray-200]="!usedDigits().has(digit)"
      [class.active:bg-gray-300]="!usedDigits().has(digit)"
      [class.active:scale-95]="!usedDigits().has(digit)"
      [class.bg-gray-50]="usedDigits().has(digit)"
      [class.text-gray-300]="usedDigits().has(digit)"
      [class.cursor-not-allowed]="usedDigits().has(digit)"
      (click)="onDigit(digit)"
    >
      @if (usedDigits().has(digit)) {
        ×
      } @else {
        {{ digit }}
      }
    </button>
  }
  <button
    type="button"
    class="flex aspect-square items-center justify-center rounded-xl bg-red-50 text-red-600 transition-colors hover:bg-red-100 active:bg-red-200 active:scale-95"
    (click)="onErase()"
    aria-label="Erase"
  >
    <svg aria-hidden="true" class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"
      />
    </svg>
  </button>
</div>
