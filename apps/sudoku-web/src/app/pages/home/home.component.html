<div class="flex min-h-full flex-col items-center justify-center gap-8 px-6 py-12">
  <div class="text-center">
    <h1 class="text-4xl font-bold tracking-tight text-foreground">Sudoku</h1>
    <p class="mt-2 text-muted">Fill the grid with numbers 1–9</p>
  </div>

  <div class="flex w-full max-w-xs flex-col gap-3">
    @if (hasActiveGame()) {
      <button
        type="button"
        class="w-full rounded-2xl bg-primary px-6 py-4 text-base font-semibold text-on-primary shadow-sm transition-colors hover:bg-primary-hover active:bg-primary-hover disabled:opacity-50"
        [disabled]="app.isRestoring()"
        (click)="continueGame()"
      >
        @if (app.isRestoring()) {
          Restoring…
        } @else {
          Continue Game
        }
      </button>

      <button
        type="button"
        class="w-full rounded-2xl border border-border px-6 py-4 text-base font-semibold text-foreground transition-colors hover:bg-surface-muted active:bg-surface-strong"
        (click)="openModal()"
      >
        New Game
      </button>
    } @else {
      <button
        type="button"
        class="w-full rounded-2xl bg-primary px-6 py-4 text-base font-semibold text-on-primary shadow-sm transition-colors hover:bg-primary-hover active:bg-primary-hover"
        (click)="openModal()"
      >
        Start Game
      </button>
    }
  </div>
</div>

@if (showModal()) {
  <app-modal
    [initialDifficulty]="app.lastDifficulty()"
    (cancelModal)="closeModal()"
    (confirmModal)="hasActiveGame() ? onNewGame($event) : onStartGame($event)"
  />
}
