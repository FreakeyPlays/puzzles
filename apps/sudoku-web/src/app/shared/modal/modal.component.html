<dialog
  #dialog
  appAutoShow
  class="w-full max-w-xs rounded-2xl border-0 bg-surface p-6 shadow-xl m-auto backdrop:bg-black/50"
  aria-labelledby="modal-title"
  (cancel)="onDialogCancel($event)"
>
  <h2 id="modal-title" class="mb-4 text-xl font-bold text-foreground">Select Difficulty</h2>

  <div class="mb-6 space-y-2" role="radiogroup" aria-label="Difficulty">
    @for (difficulty of difficulties; track difficulty) {
      <button
        type="button"
        role="radio"
        [attr.aria-checked]="selected() === difficulty"
        class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left text-sm font-medium transition-colors"
        [class.bg-primary]="selected() === difficulty"
        [class.text-on-primary]="selected() === difficulty"
        [class.bg-surface-muted]="selected() !== difficulty"
        [class.text-foreground]="selected() !== difficulty"
        (click)="onSelect(difficulty)"
      >
        <span
          class="size-4 rounded-full border-2 flex items-center justify-center flex-shrink-0"
          [class.border-white]="selected() === difficulty"
          [class.border-muted]="selected() !== difficulty"
          aria-hidden="true"
        >
          @if (selected() === difficulty) {
            <span class="size-2 rounded-full bg-white"></span>
          }
        </span>
        <span class="capitalize">{{ difficulty }}</span>
      </button>
    }
  </div>

  <div class="flex gap-3">
    <button
      type="button"
      class="flex-1 rounded-xl border border-border px-4 py-3 text-sm font-semibold text-foreground transition-colors hover:bg-surface-muted active:bg-surface-strong"
      (click)="onCancel()"
    >
      Cancel
    </button>
    <button
      type="button"
      class="flex-1 rounded-xl bg-primary px-4 py-3 text-sm font-semibold text-on-primary transition-colors hover:bg-primary-hover active:bg-primary-hover"
      (click)="onConfirm()"
    >
      Start
    </button>
  </div>
</dialog>
