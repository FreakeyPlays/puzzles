<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sudoku</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script>
      const savedThemeJson = localStorage.getItem('sudoku:theme');
      const savedTheme = savedThemeJson ? JSON.parse(savedThemeJson) : null;
      const { classList } = document.documentElement;

      const explicit = savedTheme === 'dark' || savedTheme === 'light';
      const isDark = explicit
        ? savedTheme === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (isDark) classList.add('dark');

      if (explicit) {
        document.querySelectorAll('meta[name="theme-color"]').forEach((el) => el.remove());
        const meta = document.createElement('meta');
        meta.name = 'theme-color';
        meta.content = isDark ? '#0a0a0a' : '#f9fafb';
        document.head.appendChild(meta);
      }
    </script>
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
