name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate changesets from commits
        env:
          COMMIT_RANGE: ${{ github.event.before }}..${{ github.event.after }}
        run: bun ./scripts/generate-changesets.ts

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: bun run changeset publish
          version: bun run changeset:version
          commit: "ci: version packages"
          title: "Update Package Versions"
          createGithubReleases: false
          prDraft: "always"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tags
        if: steps.changesets.outputs.published == 'true'
        run: git push origin --tags

  artifacts:
    name: Build & Upload Artifacts
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            packages/sudoku-core
            packages/sudoku-wasm

      - name: Detect artifact types
        id: detect
        env:
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.publishedPackages }}
        run: bun ./scripts/detect-artifacts.ts

      - name: Get Secrets
        if: steps.detect.outputs.has_apk == 'true'
        uses: bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # v3
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          base_url: https://vault.bitwarden.com
          secrets: |
            95a6a8c7-65a0-4e42-a6dd-b45b017c7f83 > ANDROID_KEYSTORE_BASE64
            beaca145-2224-47b5-87da-b45b017c2462 > ANDROID_KEY_ALIAS
            1d849480-8d2e-4267-9107-b45b017c3b74 > ANDROID_KEYSTORE_PASSWORD
            8fcc4d60-cbd5-4f45-9fd6-b45b017c5b5b > ANDROID_KEY_PASSWORD

      - name: Set up JDK 17
        if: steps.detect.outputs.has_apk == 'true'
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: steps.detect.outputs.has_apk == 'true'
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Configure Bubblewrap
        if: steps.detect.outputs.has_apk == 'true'
        run: |
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          { "jdkPath": "${JAVA_HOME}", "androidSdkPath": "${ANDROID_SDK_ROOT}" }
          EOF

      - name: Decode signing keystore
        if: steps.detect.outputs.has_apk == 'true'
        run: echo "${{ env.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload.keystore

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build crates
        if: steps.detect.outputs.has_crate == 'true'
        run: |
          echo '${{ steps.detect.outputs.manifest }}' | jq -c '.[] | select(.kind == "crate")' | while read -r entry; do
            dir=$(echo "$entry" | jq -r '.dir')
            cargo package --no-verify --manifest-path "$dir/Cargo.toml"
          done

      - name: Build wasm npm packages
        if: steps.detect.outputs.has_wasm == 'true'
        run: |
          echo '${{ steps.detect.outputs.manifest }}' | jq -c '.[] | select(.kind == "wasm")' | while read -r entry; do
            dir=$(echo "$entry" | jq -r '.dir')
            (cd "$dir" && bun run build && npm pack)
          done

      - name: Build APKs
        if: steps.detect.outputs.has_apk == 'true'
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
        run: |
          echo '${{ steps.detect.outputs.manifest }}' | jq -c '.[] | select(.kind == "apk")' | while read -r entry; do
            dir=$(echo "$entry" | jq -r '.dir')
            (cd "$dir" && ANDROID_KEYSTORE_PATH=/tmp/upload.keystore bun run build:android)
          done

      - name: Upload artifacts to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.publishedPackages }}
        run: bun ./scripts/upload-release-artifacts.ts
